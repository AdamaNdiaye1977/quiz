<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎬 Quiz Lebensmittel – Startseite</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="manifest" href="/manifest.json" />
</head>

<body>
  <!--Header-->
  <header class="site-header">
    <div class="container">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo">
        <h1 class="site-title">Quiz Lebensmittel</h1>
        <nav>
            <!-- ✅ Menu -->
            <div class="dropdown-menu-wrapper">
                <button class="dropdown-toggle">☰</button>
                <ul class="dropdown-menu">
                    <li><a href="{{ url_for('info') }}">ℹ️ Info</a></li>
                   <!-- <li><a href="{{ url_for('result') }}">📊 Resultate</a></li> -->
                    <li><a href="{{ url_for('settings') }}">⚙️ Einstellungen</a></li>
                  <!-- <li><a href="{{ url_for('logout') }}">📊 Logout</a></li> -->
                  <a href="/logout" style="font-size: 24px;">🔓 Logout</a>
                </ul>
            </div>
        </nav>
    </div> <!-- chiusura container -->
  </header>

  <div class="quiz-container">
    <h1 class="quiz-title">🎉 Willkommen zum Quiz!</h1>
    <form action="/start_quiz" method="post" class="start-form">
      <label for="category" class="input-label">Wähle eine Kategorie:</label>
      <select name="category" id="category" class="select-input">
        <option value="bake-off">Bake-Off</option>
        <option value="gemüse">Gemüse</option>
        <option value="obs">Obs</option>
        <option value="blumen">Blumen</option>
      </select>
      <div>
      <button type="submit">🎬 Quiz starten</button>
      </div>
    </form>

    <!-- Aggiungiamo il pulsante "Codes Lernen" con lo stesso stile -->
    <div class="button-container">
      <form action="{{ url_for('lernen') }}" method="get">
        <button type="submit" class="btn btn-learn">🎓Codes Lernen</button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
        <p>&copy; 2025 Quiz Lebensmittel – Alle Rechte vorbehalten</p>
        <p>&copy; Adama Ndiaye – Egmating - Deutschland</p>
    </div>
  </footer>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/service-worker.js')
          .then((registration) => {
            console.log('✅ Service Worker registrato con successo:', registration);
          })
          .catch((error) => {
            console.error('❌ Registrazione Service Worker fallita:', error);
          });
      });
    }
  </script>

  <!-- JavaScript per il menu dropdown -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const menuButton = document.querySelector(".dropdown-toggle");
      const menuWrapper = document.querySelector(".dropdown-menu-wrapper");

      // Gestisci il click sul pulsante del menu
      menuButton.addEventListener("click", () => {
        menuWrapper.classList.toggle("open");
      });
    });
  </script>
  
  <script src="{{ url_for('static', filename='js/app.js') }}"></script> <!-- Assicurati che il percorso sia corretto -->
</body>
</html>
